name: Create release tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 2.3.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    name: Validate and tag release
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Verify CHANGELOG entry exists
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "ERROR: No [${VERSION}] section found in CHANGELOG.md" >&2
            echo "Add release notes for ${VERSION} to CHANGELOG.md before tagging." >&2
            exit 1
          fi
          echo "CHANGELOG entry found for ${VERSION}"

      - name: Create and push tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${VERSION}" -m "Release ${VERSION}"
          git push origin "${VERSION}"
