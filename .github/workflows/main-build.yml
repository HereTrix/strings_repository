name: Image build
permissions:
  contents: read
  
on:
  workflow_dispatch:

  push:
    tags:
      - '*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Django tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required static directory
        run: mkdir -p webui/static

      - name: Run tests
        env:
          APP_SECRET_KEY: ci-secret-key
          DB_ENGINE: sqlite3
          DB_NAME: ci
        run: python manage.py test api --verbosity=2


  push_to_registry:
    name: Build and push Docker image to GitHub Packages
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Log in to the Container registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Docker image build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }},ghcr.io/heretrix/strings_repository:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker container smoke test
        id: smoke-test
        run: |
          docker run \
          -e DJANGO_SUPERUSER_EMAIL=test@test.com \
          -e DJANGO_SUPERUSER_PASSWORD=test \
          -e DJANGO_SUPERUSER_USERNAME=test \
          -e SUPERUSER_EMAIL=test@test.com \
          -e DB_ENGINE=sqlite3 \
          -e DB_NAME=test \
          -e APP_SECRET_KEY=y9Sag4UWWLHyp \
          --name testct -d -p 8080:8080 ${{ steps.meta.outputs.tags }}

          for i in $(seq 1 15); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' testct 2>/dev/null || echo "unknown")
            echo "Attempt $i/15: $STATUS"
            [ "$STATUS" = "healthy" ] && break
            if [ "$i" = "15" ]; then
              echo "Container did not become healthy. Printing logs."
              docker logs testct
              exit 1
            fi
            sleep 6
          done

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ghcr.io/heretrix/strings_repository:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Docker image push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Cleanup
        if: always()
        run: docker rm -f testct || true
