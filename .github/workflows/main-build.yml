name: image build

on:
  push:
    branches:
      - main
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Django tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required static directory
        run: mkdir -p webui/static

      - name: Run tests
        env:
          APP_SECRET_KEY: ci-secret-key
          DB_ENGINE: sqlite3
          DB_NAME: ci
        run: python manage.py test api --verbosity=2

  push_to_registry:
    name: Build and push Docker image to GitHub Packages
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker image build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }},ghcr.io/heretrix/strings_repository:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker container smoke test
        id: smoke-test
        run: |
          docker run \
          -e DJANGO_SUPERUSER_EMAIL=test@test.com \
          -e DJANGO_SUPERUSER_PASSWORD=test \
          -e DJANGO_SUPERUSER_USERNAME=test \
          -e SUPERUSER_EMAIL=test@test.com \
          -e DB_ENGINE=sqlite3 \
          -e DB_NAME=test \
          -e APP_SECRET_KEY=y9Sag4UWWLHyp \
          --name testct -d -p 8080:8080 ${{ steps.meta.outputs.tags }}

          for i in $(seq 1 15); do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' testct 2>/dev/null || echo "unknown")
            echo "Attempt $i/15: $STATUS"
            [ "$STATUS" = "healthy" ] && break
            if [ "$i" = "15" ]; then
              echo "Container did not become healthy. Printing logs."
              docker logs testct
              exit 1
            fi
            sleep 6
          done

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/heretrix/strings_repository:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Docker image push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
