name: DCO Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: Developer Certificate of Origin
    runs-on: ubuntu-latest
    steps:
      - name: Check DCO sign-off
        uses: dcoapp/dco-action@4c7f86ee67ede1d5e5e2dc6b8afc0b16d8e28f55
