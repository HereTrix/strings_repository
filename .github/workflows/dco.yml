name: DCO Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dco:
    name: Developer Certificate of Origin
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Verify HEAD commit is signed off
        env:
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          msg=$(git log -1 --format='%B' "$HEAD")
          if ! echo "$msg" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
            echo "The latest commit is missing a Signed-off-by trailer:"
            echo "  $HEAD  $(git log -1 --format='%s' "$HEAD")"
            echo ""
            echo "Amend it with: git commit --amend --signoff"
            exit 1
          fi
          echo "HEAD commit is signed off."
